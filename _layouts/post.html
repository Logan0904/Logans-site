---
layout: default
---
<article class="post-article">
  <div class="post-eyebrow">
    {% if post.categories %}{{ page.categories | first | replace: "-", " " | capitalize }}{% else %}Guide{% endif %}
  </div>
  <h1>{{ page.title }}</h1>
  <div class="post-meta">{{ page.date | date: "%B %-d, %Y" }} &middot; {{ site.title }}</div>
  <div class="post-body">
    {{ content }}
  </div>
  <a class="post-nav-back" href="{{ "/" | relative_url }}">&larr; Back to all guides</a>
</article>
